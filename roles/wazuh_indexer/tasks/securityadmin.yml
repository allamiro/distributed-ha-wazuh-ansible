---
# roles/wazuh_indexer/tasks/securityadmin.yml
# Loads the security configuration into the cluster. Runs once, from the
# bootstrap node, after the whole cluster is up. Uses Wazuh's wrapper, which
# calls securityadmin.sh with the bundled admin cert + security config.

- name: Initialize the security index (indexer-security-init.sh)
  ansible.builtin.command:
    cmd: "{{ indexer_home }}/bin/indexer-security-init.sh"
  register: securityadmin_result
  changed_when: "'Done with success' in securityadmin_result.stdout"
