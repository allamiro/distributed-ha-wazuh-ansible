---
# roles/common/tasks/network.yml
# Configures DNS (and the default gateway on static connections) on the primary
# NetworkManager connection, then restarts NetworkManager so /etc/resolv.conf is
# regenerated. Idempotent: only modifies when values differ.

- name: Ensure NetworkManager is running
  ansible.builtin.service:
    name: NetworkManager
    state: started
    enabled: true

- name: Determine primary network interface (default route)
  ansible.builtin.set_fact:
    common_primary_iface: "{{ ansible_facts['default_ipv4']['interface'] }}"
  when: ansible_facts['default_ipv4']['interface'] is defined

- name: Fail clearly if no default-route interface was found
  ansible.builtin.fail:
    msg: "Could not determine the primary interface; set common_manage_network: false or fix routing."
  when: common_primary_iface is not defined

- name: Find the NetworkManager connection bound to the primary interface
  ansible.builtin.command: "nmcli -t -g GENERAL.CONNECTION device show {{ common_primary_iface }}"
  register: nm_conn
  changed_when: false

- name: Set the primary connection name
  ansible.builtin.set_fact:
    common_primary_conn: "{{ nm_conn.stdout | trim }}"

- name: Fail if the interface has no active connection profile
  ansible.builtin.fail:
    msg: "Interface {{ common_primary_iface }} has no NetworkManager connection profile."
  when: common_primary_conn | length == 0

- name: Configure DNS servers and search domain (idempotent)
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      conn="{{ common_primary_conn }}"
      want_dns="{{ dns_servers | join(',') }}"
      want_search="{{ dns_domain }}"
      cur_dns="$(nmcli -g ipv4.dns connection show "$conn" || true)"
      cur_search="$(nmcli -g ipv4.dns-search connection show "$conn" || true)"
      if [ "$cur_dns" != "$want_dns" ] || [ "$cur_search" != "$want_search" ]; then
        nmcli connection modify "$conn" \
          ipv4.dns "{{ dns_servers | join(' ') }}" \
          ipv4.dns-search "{{ dns_domain }}" \
          ipv4.ignore-auto-dns yes
        echo CHANGED
      fi
  register: dns_cfg
  changed_when: "'CHANGED' in dns_cfg.stdout"

# Only pin the gateway on STATIC (manual) connections — on DHCP the gateway is
# provided automatically and nmcli refuses a static gateway.
- name: Configure default gateway on static connections (idempotent)
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      conn="{{ common_primary_conn }}"
      method="$(nmcli -g ipv4.method connection show "$conn" || echo auto)"
      if [ "$method" = "manual" ]; then
        want_gw="{{ network_gateway }}"
        cur_gw="$(nmcli -g ipv4.gateway connection show "$conn" || true)"
        if [ "$cur_gw" != "$want_gw" ]; then
          nmcli connection modify "$conn" ipv4.gateway "$want_gw"
          echo CHANGED
        fi
      fi
  register: gw_cfg
  changed_when: "'CHANGED' in gw_cfg.stdout"
  when: common_configure_gateway | bool

# Apply the change by restarting NetworkManager so /etc/resolv.conf is
# regenerated. Restarting NM drops our SSH session, so do it fire-and-forget
# (async + poll 0) and then wait for the host to come back — otherwise the task
# dies with the connection (this is what failed every non-dashboard host).
- name: Restart NetworkManager to apply DNS/gateway (async; drops SSH briefly)
  ansible.builtin.command: systemctl restart NetworkManager
  async: 60
  poll: 0
  when: dns_cfg is changed or gw_cfg is changed

- name: Wait for the host to be reachable again after the restart
  ansible.builtin.wait_for_connection:
    delay: 3
    timeout: 120
  when: dns_cfg is changed or gw_cfg is changed

- name: Verify the configured DNS is present in /etc/resolv.conf
  ansible.builtin.command: "grep -q '{{ dns_servers[0] }}' /etc/resolv.conf"
  register: resolv_check
  changed_when: false
  failed_when: false

- name: Warn if resolv.conf did not pick up the DNS
  ansible.builtin.debug:
    msg: >-
      WARNING: {{ dns_servers[0] }} not found in /etc/resolv.conf after restart.
      Check NetworkManager / DNS config on {{ inventory_hostname }}.
  when: resolv_check.rc != 0
