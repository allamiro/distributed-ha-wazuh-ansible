---
# roles/common/handlers/main.yml

# Restart NetworkManager so it re-applies the connection AND regenerates
# /etc/resolv.conf (nmcli connection up alone did not reliably rewrite it).
- name: Reload primary connection
  ansible.builtin.systemd:
    name: NetworkManager
    state: restarted

- name: Bring the primary connection back up
  ansible.builtin.command: "nmcli connection up {{ common_primary_conn }}"
  changed_when: true
