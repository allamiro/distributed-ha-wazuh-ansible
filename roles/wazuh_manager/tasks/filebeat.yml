---
# roles/wazuh_manager/tasks/filebeat.yml

- name: Install Filebeat
  ansible.builtin.dnf:
    name: "{{ filebeat_package }}"
    state: present

# --- Certificates (delivered to /etc/filebeat/certs by the certificates role) ---
- name: Ensure the Filebeat certificates directory exists
  ansible.builtin.file:
    path: "{{ filebeat_certs_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0500"
  when: enable_ssl | bool

- name: Verify the Filebeat node certificate is present
  ansible.builtin.stat:
    path: "{{ filebeat_certs_dir }}/{{ inventory_hostname }}.pem"
  register: filebeat_cert_stat
  when: enable_ssl | bool

- name: Fail if the Filebeat certificate is missing
  ansible.builtin.fail:
    msg: >-
      {{ filebeat_certs_dir }}/{{ inventory_hostname }}.pem not found.
      Run playbooks/certificates.yml before deploying the manager.
  when:
    - enable_ssl | bool
    - not filebeat_cert_stat.stat.exists

- name: Ensure Filebeat owns its certificates (post-install chown)
  ansible.builtin.file:
    path: "{{ filebeat_certs_dir }}"
    owner: root
    group: root
    recurse: true
  when: enable_ssl | bool

# --- Wazuh alerts template + Filebeat module ---
- name: Download the Wazuh alerts template
  ansible.builtin.get_url:
    url: "{{ filebeat_template_url }}"
    dest: /etc/filebeat/wazuh-template.json
    owner: root
    group: root
    mode: "0644"

- name: Download the Wazuh Filebeat module
  ansible.builtin.get_url:
    url: "{{ filebeat_module_url }}"
    dest: /tmp/wazuh-filebeat-module.tar.gz
    owner: root
    group: root
    mode: "0644"

- name: Extract the Wazuh Filebeat module
  ansible.builtin.unarchive:
    src: /tmp/wazuh-filebeat-module.tar.gz
    dest: /usr/share/filebeat/module
    remote_src: true
    creates: /usr/share/filebeat/module/wazuh

# --- Configuration + service ---
- name: Deploy filebeat.yml
  ansible.builtin.template:
    src: filebeat.yml.j2
    dest: /etc/filebeat/filebeat.yml
    owner: root
    group: root
    mode: "0600"
  notify: Restart filebeat

- name: Enable and start Filebeat
  ansible.builtin.service:
    name: "{{ filebeat_service }}"
    state: started
    enabled: true
