---
# roles/wazuh_manager/tasks/main.yml

- name: Install the Wazuh manager
  ansible.builtin.dnf:
    name: "{{ manager_package }}{{ ('-' ~ wazuh_version) if wazuh_pin_packages | default(true) else '' }}"
    state: present

- name: Configure the cluster section in ossec.conf
  ansible.builtin.replace:
    path: "{{ manager_conf }}"
    regexp: '(?s)<cluster>.*?</cluster>'
    replace: "{{ lookup('ansible.builtin.template', 'cluster.xml.j2') }}"
  notify: Restart wazuh-manager

- name: Configure the indexer connector section in ossec.conf
  ansible.builtin.replace:
    path: "{{ manager_conf }}"
    regexp: '(?s)<indexer>.*?</indexer>'
    replace: "{{ lookup('ansible.builtin.template', 'indexer.xml.j2') }}"
  notify: Restart wazuh-manager

# The indexer connector authenticates to the indexer with credentials read from
# the manager keystore (not from ossec.conf). Only needed when TLS/auth is on.
# Track a hash of the creds so we only (re)write the keystore AND restart when
# they actually change — fixes rotated creds silently not taking effect.
- name: Track manager keystore credentials (rotation detection)
  ansible.builtin.copy:
    dest: /var/ossec/.indexer_keystore_hash
    content: "{{ (filebeat_indexer_username ~ ':' ~ filebeat_indexer_password) | hash('sha256') }}"
    owner: root
    group: root
    mode: "0600"
  register: manager_keystore_marker
  no_log: true
  when: enable_ssl | bool

- name: Store indexer credentials in the Wazuh manager keystore
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      echo '{{ filebeat_indexer_username }}' | /var/ossec/bin/wazuh-keystore -f indexer -k username
      echo '{{ filebeat_indexer_password }}' | /var/ossec/bin/wazuh-keystore -f indexer -k password
    executable: /bin/bash
  no_log: true
  when:
    - enable_ssl | bool
    - manager_keystore_marker is changed
  notify: Restart wazuh-manager

- name: Open Wazuh manager firewall ports
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - "{{ manager_agent_port }}/tcp"
    - "{{ manager_enroll_port }}/tcp"
    - "{{ manager_cluster_port }}/tcp"
    - "{{ manager_api_port }}/tcp"
  when: common_manage_firewall | default(true) | bool

- name: Enable and start the Wazuh manager
  ansible.builtin.service:
    name: "{{ manager_service }}"
    state: started
    enabled: true

- name: Configure Filebeat
  ansible.builtin.import_tasks: filebeat.yml
