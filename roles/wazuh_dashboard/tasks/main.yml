---
# roles/wazuh_dashboard/tasks/main.yml

- name: Install the Wazuh dashboard
  ansible.builtin.dnf:
    name: "{{ dashboard_package }}{{ ('-' ~ wazuh_version) if wazuh_pin_packages | default(true) else '' }}"
    state: present

# --- Dashboard security plugin must match the security mode (reversible):
#   enable_ssl=false -> remove it (no auth backend; else every login 401s with
#                       "no handler found for /_plugins/_security/authinfo").
#   enable_ssl=true  -> ensure it's present (restore via package reinstall if a
#                       previous no-security run removed it), so login works.
- name: Check whether the dashboard security plugin is installed
  ansible.builtin.stat:
    path: "{{ dashboard_home }}/plugins/securityDashboards"
  register: dashboard_security_plugin

- name: Remove the dashboard security plugin (no-security build)
  ansible.builtin.command:
    cmd: "{{ dashboard_home }}/bin/opensearch-dashboards-plugin remove securityDashboards --allow-root"
  when:
    - not (enable_ssl | bool)
    - dashboard_security_plugin.stat.exists
  notify: Restart wazuh-dashboard

- name: Restore the dashboard security plugin (security build, if missing)
  ansible.builtin.command:
    cmd: "dnf reinstall -y {{ dashboard_package }}{{ ('-' ~ wazuh_version) if wazuh_pin_packages | default(true) else '' }}"
  when:
    - enable_ssl | bool
    - not dashboard_security_plugin.stat.exists
  notify: Restart wazuh-dashboard

# --- Certificates (delivered by the certificates role) ---
- name: Ensure the dashboard certificates directory exists
  ansible.builtin.file:
    path: "{{ dashboard_certs_dir }}"
    state: directory
    owner: wazuh-dashboard
    group: wazuh-dashboard
    mode: "0500"
  when: http_tls | bool

- name: Verify the dashboard node certificate is present
  ansible.builtin.stat:
    path: "{{ dashboard_certs_dir }}/{{ inventory_hostname }}.pem"
  register: dashboard_cert_stat
  when: http_tls | bool

- name: Fail if the dashboard certificate is missing
  ansible.builtin.fail:
    msg: >-
      {{ dashboard_certs_dir }}/{{ inventory_hostname }}.pem not found.
      Run playbooks/certificates.yml before deploying the dashboard.
  when:
    - http_tls | bool
    - not dashboard_cert_stat.stat.exists

- name: Ensure the dashboard owns its certificates (post-install chown)
  ansible.builtin.file:
    path: "{{ dashboard_certs_dir }}"
    owner: wazuh-dashboard
    group: wazuh-dashboard
    recurse: true
  when: http_tls | bool

# --- Configuration ---
- name: Deploy opensearch_dashboards.yml
  ansible.builtin.template:
    src: opensearch_dashboards.yml.j2
    dest: "{{ dashboard_conf }}"
    owner: wazuh-dashboard
    group: wazuh-dashboard
    mode: "0640"
  notify: Restart wazuh-dashboard

- name: Ensure the Wazuh app config directory exists
  ansible.builtin.file:
    path: "{{ dashboard_app_conf | dirname }}"
    state: directory
    owner: wazuh-dashboard
    group: wazuh-dashboard
    mode: "0750"

- name: Configure the Wazuh app API connection
  ansible.builtin.template:
    src: wazuh.yml.j2
    dest: "{{ dashboard_app_conf }}"
    owner: wazuh-dashboard
    group: wazuh-dashboard
    mode: "0600"
  notify: Restart wazuh-dashboard

- name: Open the dashboard firewall port
  ansible.posix.firewalld:
    port: "{{ dashboard_port }}/tcp"
    permanent: true
    immediate: true
    state: enabled
  when: common_manage_firewall | default(true) | bool

- name: Enable and start the Wazuh dashboard
  ansible.builtin.service:
    name: "{{ dashboard_service }}"
    state: started
    enabled: true
