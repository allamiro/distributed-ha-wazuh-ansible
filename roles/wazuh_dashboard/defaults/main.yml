---
# roles/wazuh_dashboard/defaults/main.yml

dashboard_package: wazuh-dashboard
dashboard_service: wazuh-dashboard
dashboard_home: /usr/share/wazuh-dashboard
dashboard_conf: /etc/wazuh-dashboard/opensearch_dashboards.yml
dashboard_app_conf: /usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
dashboard_certs_dir: /etc/wazuh-dashboard/certs

dashboard_port: 443
dashboard_server_host: "0.0.0.0"

# UI / security
dashboard_default_route: "/app/wz-home"
dashboard_multitenancy_enabled: false

# Indexer connection (dashboard -> indexer)
dashboard_opensearch_username: "kibanaserver"
dashboard_opensearch_password: "{{ vault_dashboard_admin_password | default('kibanaserver') }}"

# Wazuh API connection (dashboard app -> manager API)
dashboard_api_port: 55000
dashboard_api_username: "wazuh-wui"
dashboard_api_password: "{{ vault_wazuh_api_password | default('wazuh-wui') }}"
# run_as maps the dashboard login to the API user's RBAC. Requires the wazuh-wui
# API user to have run_as enabled; leave false unless you've configured that.
dashboard_api_run_as: false

# HTTP/REST-layer TLS. Falls back to enable_ssl unless overridden.
http_tls: "{{ enable_ssl | default(true) }}"
