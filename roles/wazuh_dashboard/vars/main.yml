---
# roles/wazuh_dashboard/vars/main.yml
# Connection lists derived from the inventory (SSL-aware).

dashboard_scheme: "{{ 'https' if http_tls | default(true) else 'http' }}"

# Dashboard -> indexer cluster URLs
dashboard_opensearch_hosts: >-
  {{ groups['wazuh_indexer'] | map('extract', hostvars, 'ansible_host')
     | map('regex_replace', '^', dashboard_scheme ~ '://')
     | map('regex_replace', '$', ':' ~ (indexer_http_port | default(9200)))
     | list }}

# Dashboard app -> Wazuh manager master API
dashboard_api_host: "{{ hostvars[groups['wazuh_manager_master'][0]].ansible_host }}"
