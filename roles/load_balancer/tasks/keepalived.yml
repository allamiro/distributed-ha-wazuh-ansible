---
# roles/load_balancer/tasks/keepalived.yml
# Floats a virtual IP across the load balancers via VRRP. Only runs when there
# are 2+ LB hosts (lb_keepalived_enabled).

- name: Install keepalived
  ansible.builtin.dnf:
    name: keepalived
    state: present

- name: Deploy keepalived.conf
  ansible.builtin.template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart keepalived

- name: Allow VRRP through the firewall
  ansible.posix.firewalld:
    rich_rule: 'rule protocol value="vrrp" accept'
    permanent: true
    immediate: true
    state: enabled
  when: common_manage_firewall | default(true) | bool

- name: Enable and start keepalived
  ansible.builtin.service:
    name: keepalived
    state: started
    enabled: true
