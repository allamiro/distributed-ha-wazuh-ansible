---
# Minimal single-node-per-tier staging topology for testing playbooks.
all:
  vars:
    ansible_user: ansible
  children:
    wazuh_indexer:
      hosts:
        stg-indexer-1: { ansible_host: 10.10.1.11 }
    wazuh_manager:
      children:
        wazuh_manager_master:
          hosts:
            stg-manager-master: { ansible_host: 10.10.2.11 }
        wazuh_manager_worker:
          hosts: {}
    wazuh_dashboard:
      hosts:
        stg-dashboard-1: { ansible_host: 10.10.3.11 }
    load_balancer:
      hosts: {}
