---
# Minimal single-node-per-tier staging topology (no-SSL, no CA) for testing
# playbooks end-to-end on a small footprint.
all:
  vars:
    ansible_user: ansible
    ansible_python_interpreter: /usr/bin/python3

    network_prefix: 16
    network_cidr: "10.10.0.0/16"
    network_gateway: "10.10.0.1"
    dns_servers:
      - "10.10.0.1"
      - "8.8.8.8"     # internet resolver fallback (replace w/ site upstream if blocked)
      - "1.1.1.1"
    dns_domain: "local.domain"
    node_fqdn: "{{ inventory_hostname }}.{{ dns_domain }}"

    enable_ssl: false
    http_tls: false

  children:
    # No CA in staging — declared empty so the shared certificates play resolves.
    wazuh_ca:
      hosts: {}

    load_balancer:
      hosts: {}

    wazuh_dashboard:
      hosts:
        stg-dashboard-1: { ansible_host: 10.10.3.11 }

    wazuh_indexer:
      children:
        indexer_hot:
          vars: { indexer_temp: hot }
          hosts:
            stg-indexer-1: { ansible_host: 10.10.1.11 }
        indexer_warm:
          hosts: {}
        indexer_cold:
          hosts: {}

    wazuh_manager:
      children:
        wazuh_manager_master:
          hosts:
            stg-manager-master: { ansible_host: 10.10.2.11 }
        wazuh_manager_worker:
          hosts: {}
