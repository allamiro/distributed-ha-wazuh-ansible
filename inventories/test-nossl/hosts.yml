---
# =============================================================================
# Wazuh SIEM — NO-SSL test inventory
# Same topology as production, but enable_ssl=false: the certificates role is
# skipped and the indexer runs with plugins.security.disabled. No CA host.
# Use only for fast functional testing on a trusted/isolated network.
# =============================================================================

all:
  vars:
    ansible_user: ansible
    # Set your deploy key here, or pass --private-key / -k on the CLI.
    # ansible_ssh_private_key_file: ~/.ssh/wazuh_deploy
    ansible_python_interpreter: /usr/bin/python3

    network_prefix: 16
    network_cidr: "10.0.0.0/16"
    network_gateway: "10.0.0.1"
    # 10.0.0.1 (internal) could not resolve packages.wazuh.com; add internet
    # resolvers so package/key downloads work. Replace 8.8.8.8/1.1.1.1 with your
    # site's real upstream resolver if public DNS is blocked.
    dns_servers:
      - "10.0.0.1"
      - "8.8.8.8"
      - "1.1.1.1"
    dns_domain: "local.domain"
    node_fqdn: "{{ inventory_hostname }}.{{ dns_domain }}"

    enable_ssl: false          # <-- the whole point of this inventory

  children:
    # No CA in the no-SSL build. Declared empty so the shared certificates
    # playbook's host pattern (wazuh_ca:...) resolves without a warning.
    # enable_ssl=false makes the certificates role skip regardless.
    wazuh_ca:
      hosts: {}

    load_balancer:
      hosts:
        haproxy-1: { ansible_host: 10.0.100.10 }

    wazuh_dashboard:
      hosts:
        dashboard-1: { ansible_host: 10.0.100.20 }
        dashboard-2: { ansible_host: 10.0.100.30 }

    wazuh_indexer:
      children:
        indexer_hot:
          vars: { indexer_temp: hot }
          hosts:
            indexer-hot-1: { ansible_host: 10.0.100.40 }
            indexer-hot-2: { ansible_host: 10.0.100.41 }
            indexer-hot-3: { ansible_host: 10.0.100.42 }
        indexer_warm:
          vars: { indexer_temp: warm }
          hosts:
            indexer-warm-1: { ansible_host: 10.0.100.50 }
        indexer_cold:
          vars: { indexer_temp: cold }
          hosts:
            indexer-cold-1: { ansible_host: 10.0.100.60 }

    wazuh_manager:
      children:
        wazuh_manager_master:
          hosts:
            manager-master-1: { ansible_host: 10.0.100.70 }
        wazuh_manager_worker:
          hosts:
            manager-worker-1: { ansible_host: 10.0.100.71 }
            manager-worker-2: { ansible_host: 10.0.100.72 }
