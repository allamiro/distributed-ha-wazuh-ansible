---
# Shared vars for the no-SSL test build.
wazuh_version: "4.9.0"
wazuh_repo_baseurl: "https://packages.wazuh.com/4.x"
wazuh_repo_gpgkey: "https://packages.wazuh.com/key/GPG-KEY-WAZUH"

target_os: "Rocky Linux 9"
wazuh_cluster_name: "wazuh-test"

wazuh_vip: "10.0.100.10"
wazuh_dashboard_fqdn: "siem.local.domain"
wazuh_dashboard_url: "http://{{ wazuh_dashboard_fqdn }}"   # http, no TLS

# No TLS -> serve on plain HTTP port 80, not 443.
#   dashboard_port        -> dashboards listen on 80 (+ dashboard firewall 80)
#   lb_dashboard_bind_port -> HAProxy fronts on 80 (+ LB firewall 80); the
#                             backend port derives from dashboard_port (80).
dashboard_port: 80
lb_dashboard_bind_port: 80

# Security + HTTP TLS both off (no auth, plain http) — lab smoke test only
enable_ssl: false
http_tls: false
certs_generate_on: "indexer-hot-1"
