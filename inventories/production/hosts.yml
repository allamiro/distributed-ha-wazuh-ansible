---
# =============================================================================
# Enterprise Distributed Wazuh SIEM — Production Inventory
# Target OS : Rocky Linux 9
# Network   : 10.0.0.0/16   gateway 10.0.0.1   dns 10.0.0.1   domain local.domain
# Main URL  : https://siem.local.domain  (dashboard, fronted by HAProxy)
# Hostnames : <inventory_hostname>.local.domain  (set on the boxes by the
#             common role during the playbook run)
# =============================================================================
#
# Topology
#   HAProxy (HA access layer) ............ 10.0.100.10
#   Wazuh Dashboards x2 ................... 10.0.100.20 / .30
#   Wazuh Indexer Cluster
#       Hot  tier x3 ..................... 10.0.100.40 / .41 / .42
#       Warm tier x1 ..................... 10.0.100.50
#       Cold tier x1 ..................... 10.0.100.60
#   Wazuh Server Cluster
#       Master x1 ........................ 10.0.100.70
#       Workers x2 ....................... 10.0.100.71 / .72
#
# SCALING: each tier/cluster below has commented "expansion slots". To add a
#          node, uncomment the line, give it the next free IP, and re-run the
#          relevant playbook (e.g. ansible-playbook playbooks/indexer.yml).
# =============================================================================

all:
  vars:
    ansible_user: ansible
    # Set your deploy key here, or pass --private-key / -k on the CLI.
    # ansible_ssh_private_key_file: ~/.ssh/wazuh_deploy
    ansible_python_interpreter: /usr/bin/python3

    # Network — every host is /16 with a single gateway + DNS at 10.0.0.1.
    network_prefix: 16
    network_cidr: "10.0.0.0/16"
    network_gateway: "10.0.0.1"
    dns_servers:
      - "10.0.0.1"
      - "8.8.8.8"     # internet resolver fallback (replace w/ site upstream if blocked)
      - "1.1.1.1"
    dns_domain: "local.domain"

    # FQDN convention. The common role sets each box's hostname to this value
    # (e.g. haproxy-1.local.domain, dashboard-1.local.domain) during the run.
    node_fqdn: "{{ inventory_hostname }}.{{ dns_domain }}"

    # TLS everywhere. This is the PRODUCTION (SSL) inventory.
    # See inventories/test-nossl for the cert-free test build.
    enable_ssl: true

  children:

    # -------------------------------------------------------------------------
    # Certificate Authority — dedicated box that generates the root CA, signs
    # every node certificate, and serves them back to each host.
    # -------------------------------------------------------------------------
    wazuh_ca:
      hosts:
        wazuh-ca: { ansible_host: 10.0.100.100 }

    # -------------------------------------------------------------------------
    # HA access layer — HAProxy (+ keepalived if you add a second LB)
    # -------------------------------------------------------------------------
    load_balancer:
      hosts:
        haproxy-1: { ansible_host: 10.0.100.10, keepalived_priority: 200 }
        # --- expansion slot: second HAProxy for VIP failover ---
        # haproxy-2: { ansible_host: 10.0.100.11, keepalived_priority: 100 }

    # -------------------------------------------------------------------------
    # Wazuh dashboards (behind HAProxy)
    # -------------------------------------------------------------------------
    wazuh_dashboard:
      hosts:
        dashboard-1: { ansible_host: 10.0.100.20 }
        dashboard-2: { ansible_host: 10.0.100.30 }
        # --- expansion slot: more dashboards ---
        # dashboard-3: { ansible_host: 10.0.100.31 }

    # -------------------------------------------------------------------------
    # Wazuh Indexer cluster (OpenSearch) — split into ISM temperature tiers.
    # All tier subgroups roll up into wazuh_indexer so they form ONE cluster;
    # the node.attr.temp attribute drives Index State Management allocation.
    # -------------------------------------------------------------------------
    wazuh_indexer:
      children:

        indexer_hot:
          vars:
            indexer_temp: hot
          hosts:
            indexer-hot-1: { ansible_host: 10.0.100.40 }
            indexer-hot-2: { ansible_host: 10.0.100.41 }
            indexer-hot-3: { ansible_host: 10.0.100.42 }
            # --- expansion slot: more hot nodes (keep an odd master quorum) ---
            # indexer-hot-4: { ansible_host: 10.0.100.43 }
            # indexer-hot-5: { ansible_host: 10.0.100.44 }

        indexer_warm:
          vars:
            indexer_temp: warm
          hosts:
            indexer-warm-1: { ansible_host: 10.0.100.50 }
            # --- expansion slot: more warm nodes ---
            # indexer-warm-2: { ansible_host: 10.0.100.51 }

        indexer_cold:
          vars:
            indexer_temp: cold
          hosts:
            indexer-cold-1: { ansible_host: 10.0.100.60 }
            # --- expansion slot: more cold nodes ---
            # indexer-cold-2: { ansible_host: 10.0.100.61 }

    # -------------------------------------------------------------------------
    # Wazuh Server cluster (manager / analysis engine / API / Filebeat)
    # -------------------------------------------------------------------------
    wazuh_manager:
      children:
        wazuh_manager_master:
          hosts:
            manager-master-1: { ansible_host: 10.0.100.70 }
        wazuh_manager_worker:
          hosts:
            manager-worker-1: { ansible_host: 10.0.100.71 }
            manager-worker-2: { ansible_host: 10.0.100.72 }
            # --- expansion slot: more workers ---
            # manager-worker-3: { ansible_host: 10.0.100.73 }
            # manager-worker-4: { ansible_host: 10.0.100.74 }

    # -------------------------------------------------------------------------
    # OPTIONAL components shown in the architecture (no IPs assigned yet).
    # Uncomment the group + host(s) and wire up the matching role to enable.
    # -------------------------------------------------------------------------

    # MinIO S3-compatible storage (indexer snapshots / backups / ML artifacts)
    # minio:
    #   hosts:
    #     minio-1: { ansible_host: 10.0.100.80 }
    #     # minio-2: { ansible_host: 10.0.100.81 }   # distributed/erasure mode
    #     # minio-3: { ansible_host: 10.0.100.82 }
    #     # minio-4: { ansible_host: 10.0.100.83 }

    # External ML server (anomaly detection / enrichment)
    # ml_server:
    #   hosts:
    #     ml-1: { ansible_host: 10.0.100.90 }

    # Wazuh agents (endpoints) — usually kept in a separate inventory file
    # wazuh_agents:
    #   hosts:
    #     # linux-ep-1: { ansible_host: 10.0.200.10 }
    #     # windows-ep-1: { ansible_host: 10.0.200.20 }
