---
# Variables shared by every host in the production environment.

wazuh_version: "4.9.0"
wazuh_repo_baseurl: "https://packages.wazuh.com/4.x"
wazuh_repo_gpgkey: "https://packages.wazuh.com/key/GPG-KEY-WAZUH"

# Target platform
target_os: "Rocky Linux 9"

# Cluster-wide network (everything sits on 10.0.0.0/16)
wazuh_cluster_name: "wazuh-prod"
network_prefix: 16
network_cidr: "10.0.0.0/16"
network_gateway: "10.0.0.1"
dns_servers:
  - "10.0.0.1"
dns_domain: "local.domain"           # every host is <inventory_hostname>.local.domain

# Public entry point — the dashboard is reached via this name through HAProxy
wazuh_vip: "10.0.100.10"             # HAProxy entry point (VIP if 2nd LB added)
wazuh_dashboard_fqdn: "siem.local.domain"
wazuh_dashboard_url: "https://{{ wazuh_dashboard_fqdn }}"

# Indexer connection list (all data nodes)
indexer_nodes: "{{ groups['wazuh_indexer'] }}"
indexer_http_port: 9200
indexer_transport_port: 9300

# Manager cluster
manager_cluster_node_name: "{{ inventory_hostname }}"
manager_cluster_port: 1516
manager_agent_port: 1514

# -----------------------------------------------------------------------------
# Credentials — PLAINTEXT, no Ansible Vault required.
# The project runs as-is with these values (whether enable_ssl is true or false).
# They are mostly Wazuh defaults; change them here for a real deployment. If you
# ever want them encrypted, move these keys into an encrypted vault.yml — but
# that is entirely optional and nothing here depends on it.
# -----------------------------------------------------------------------------
manager_cluster_key: "c98b62a9b6169ac5f67dae55ae4a9088"   # 32-char cluster key
filebeat_indexer_password: "admin"             # indexer 'admin' user (Filebeat + connector)
dashboard_opensearch_password: "kibanaserver"  # dashboard -> indexer
dashboard_api_password: "wazuh-wui"            # dashboard app -> manager API
haproxy_stats_password: "admin"                # HAProxy stats page
keepalived_auth_pass: "wazuhvrrp"              # VRRP auth (only with 2+ LBs)

# Load balancer
# false = HAProxy SSL passthrough (dashboards keep their certs)
# true  = HAProxy terminates TLS with a cert issued by the local CA (wazuh-ca)
lb_terminate_tls: false

# Certificates / PKI
enable_ssl: true
certs_dir: /etc/wazuh-certificates
ca_host: "{{ groups['wazuh_ca'][0] }}"   # dedicated CA box (generates + signs)
certs_generate_on: "indexer-hot-1"       # indexer node that runs securityadmin
